services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ncremedies-web
    init: true
    restart: unless-stopped
    ports:
      - "7000:7000"
    environment:
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:7000}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_PRODUCT_IMAGES_BUCKET=${SUPABASE_PRODUCT_IMAGES_BUCKET:-product-images}
      - NODE_ENV=production
      - PORT=${PORT:-7000}
      - HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ncremedies-network

networks:
  ncremedies-network:
    driver: bridge
