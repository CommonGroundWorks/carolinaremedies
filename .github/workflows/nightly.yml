name: Nightly

on:
  schedule:
    # 03:00 UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      skip_performance:
        description: Skip performance tests
        type: boolean
        default: false

jobs:
  database-validation:
    name: Database Schema Validation
    runs-on: ubuntu-latest
    # Only run when real Supabase credentials are available
    if: ${{ vars.SUPABASE_CONFIGURED == 'true' }}
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Database schema tests
        run: npm run test:db

  performance-lighthouse:
    name: Performance Tests (Lighthouse + Load)
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_performance }}
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:7000
      TEST_BASE_URL: http://127.0.0.1:7000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build application
        run: npm run build

      - name: Start server
        run: npm run start &
        env:
          PORT: 7000

      - name: Wait for server
        run: npx wait-on http://127.0.0.1:7000/api/health --timeout 60000

      # Both Lighthouse and load tests run against the same server instance,
      # saving a second full npm build + runner.
      - name: Run Lighthouse
        run: npm run test:lighthouse

      - name: Run load smoke tests
        run: npm run test:load

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: .tmp/lighthouse/
          retention-days: 30

  nightly-summary:
    name: Nightly Summary
    runs-on: ubuntu-latest
    needs: [performance-lighthouse]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "Performance: ${{ needs.performance-lighthouse.result }}"
          if [[ "${{ needs.performance-lighthouse.result }}" == "failure" ]]; then
            echo "::error::Nightly performance checks failed"
            exit 1
          fi
